<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — CarbonTrack</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="brand auth-brand">
          <div class="brand-mark">C</div>
          <div>
            <strong>CarbonTrack</strong>
            <span>Reset your password</span>
          </div>
        </div>

        <p class="muted">Enter your email and we'll send a password reset link.</p>

        <form id="resetForm" class="form-grid">
          <label>
            Email
            <input id="email" type="email" required autocomplete="email" placeholder="you@example.com" />
          </label>
          <div class="form-error" id="resetError"></div>
          <div class="form-success" id="resetSuccess"></div>
          <button class="primary-button" type="submit">Send reset email</button>
        </form>

        <p class="auth-footer">
          <a href="login.html">Back to sign in</a>
        </p>
      </div>
    </div>

    <script type="module">
      import { fetchConfig } from "./src/services/api.js";
      import { initFirebase, resetPassword } from "./src/services/auth.js";

      const config = await fetchConfig();
      await initFirebase(config.firebase);

      const form = document.getElementById("resetForm");
      const errorEl = document.getElementById("resetError");
      const successEl = document.getElementById("resetSuccess");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.textContent = "";
        successEl.textContent = "";

        const email = document.getElementById("email").value.trim();

        try {
          await resetPassword(email);
          successEl.textContent = "Reset email sent! Check your inbox.";
          form.reset();
        } catch (error) {
          errorEl.textContent = error.message || "Could not send reset email.";
        }
      });
    </script>
  </body>
</html>
