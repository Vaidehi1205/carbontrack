<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — CarbonTrack</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="brand auth-brand">
          <div class="brand-mark">C</div>
          <div>
            <strong>CarbonTrack</strong>
            <span>Sign in to your account</span>
          </div>
        </div>

        <form id="loginForm" class="form-grid">
          <label>
            Email
            <input id="email" type="email" required autocomplete="email" placeholder="you@example.com" />
          </label>
          <label>
            Password
            <input id="password" type="password" required autocomplete="current-password" placeholder="••••••••" />
          </label>
          <label class="checkbox-line">
            <input id="remember" type="checkbox" checked />
            <span>Remember me</span>
          </label>
          <div class="form-error" id="loginError"></div>
          <button class="primary-button" type="submit">Sign in</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <button class="ghost-button google-btn" id="googleLogin" type="button">
          Continue with Google
        </button>

        <p class="auth-footer">
          <a href="forgot-password.html">Forgot password?</a>
          ·
          <a href="register.html">Create account</a>
        </p>
      </div>
    </div>

    <script type="module">
      import { fetchConfig } from "./src/services/api.js";
      import { initFirebase, loginWithEmail, loginWithGoogle, waitForAuth } from "./src/services/auth.js";

      const config = await fetchConfig();
      await initFirebase(config.firebase);

      const existing = await waitForAuth();
      if (existing) {
        window.location.href = "/index.html";
      }

      const form = document.getElementById("loginForm");
      const errorEl = document.getElementById("loginError");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.textContent = "";
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;

        try {
          await loginWithEmail(email, password, remember);
          window.location.href = "/index.html";
        } catch (error) {
          errorEl.textContent = error.message || "Login failed. Check your credentials.";
        }
      });

      document.getElementById("googleLogin").addEventListener("click", async () => {
        errorEl.textContent = "";
        const remember = document.getElementById("remember").checked;
        try {
          await loginWithGoogle(remember);
          window.location.href = "/index.html";
        } catch (error) {
          errorEl.textContent = error.message || "Google sign-in failed.";
        }
      });
    </script>
  </body>
</html>
